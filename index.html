<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reimagined Heat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css" />
</head>
<body>

    <header class="app-header">
        <div class="header-title">
            <span class="highlight">Reimagined</span>
            <span class="plain">Heat</span>
        </div>
        <div class="header-right">
            <div class="keyhint">Freeze <kbd>Space</kbd></div>
            <button class="info-btn" title="About">i</button>
        </div>
    </header>

    <canvas class="webgl"></canvas>

    <div id="layers-panel">
        <div class="layers-header">
            <span class="layers-title">Layers</span>
            <button class="layers-toggle" id="layersToggle">−</button>
        </div>
        <div id="layersBody"></div>
    </div>

    <div id="inset-map">
        <span class="inset-label">Los Angeles</span>
    </div>

    <div id="tract-tooltip"></div>
    <script type="module" src="./script.js"></script>
</body>
</html>
